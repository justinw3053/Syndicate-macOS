    name: Grammar, Variables & Assignments
    prerequisites: []
    drills:
    - id: kata_gram_01
      type: kata
      description: String concatenation and templating.
      exercise_file: drills/ex_gram_01.py
      test_file: drills/test_gram_01.py
      prd_file: drills/playbook_gram_01.md
    - id: kata_gram_02
      type: kata
      description: List manipulation and insertion.
      exercise_file: drills/ex_gram_02.py
      test_file: drills/test_gram_02.py
      prd_file: drills/playbook_gram_02.md
    - id: kata_gram_03
      type: kata
      description: Config dictionary lookup and settings.
      exercise_file: drills/ex_gram_03.py
      test_file: drills/test_gram_03.py
      prd_file: drills/playbook_gram_03.md
    - id: kata_gram_04
